<!doctype html>
<meta charset="utf-8">
<style>
  body {
    margin: 0;
    background: #050608;
    color: #dff;
    font-family: Arial, sans-serif;
  }

  .wrap {
    display: grid;
    grid-template-columns: repeat(6, 142px);
    gap: 18px;
    padding: 28px;
  }

  .cell {
    background: #0b1015;
    border: 1px solid #1ee7ff55;
    padding: 12px;
    box-shadow: 0 0 18px #00f5ff18;
  }

  .cell img {
    width: 118px;
    height: 118px;
    display: block;
    background: #050608;
  }

  .cell span {
    display: block;
    margin-top: 8px;
    text-align: center;
    font: 700 12px monospace;
    color: #88f5ff;
  }

  .cell small {
    display: block;
    margin-top: 3px;
    text-align: center;
    font: 11px Arial, sans-serif;
    color: #d8ffffaa;
  }
</style>
<div class="wrap">
  <div class="cell"><img src="card-1001.svg"><span>1001</span><small>机能拳击</small></div>
  <div class="cell"><img src="card-1002.svg"><span>1002</span><small>液压重拳</small></div>
  <div class="cell"><img src="card-1003.svg"><span>1003</span><small>连打</small></div>
  <div class="cell"><img src="card-2001.svg"><span>2001</span><small>前进</small></div>
  <div class="cell"><img src="card-2002.svg"><span>2002</span><small>后退</small></div>
  <div class="cell"><img src="card-2004.svg"><span>2004</span><small>折跃</small></div>
  <div class="cell"><img src="card-1011.svg"><span>1011</span><small>盾击</small></div>
  <div class="cell"><img src="card-1012.svg"><span>1012</span><small>枪械</small></div>
  <div class="cell"><img src="card-1031.svg"><span>1031</span><small>斩击</small></div>
  <div class="cell"><img src="card-1025.svg"><span>1025</span><small>电击</small></div>
  <div class="cell"><img src="card-1026.svg"><span>1026</span><small>酸液</small></div>
  <div class="cell"><img src="card-1017.svg"><span>1017</span><small>扫描</small></div>
</div>
